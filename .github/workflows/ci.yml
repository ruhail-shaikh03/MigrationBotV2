name: CI Pipeline

on:
  push:
    branches: [ main, develop, phase3 ]
  pull_request:
    branches: [ main, develop, phase3 ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: migrationbot
          POSTGRES_PASSWORD: test
          POSTGRES_DB: migrationbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U migrationbot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://migrationbot:test@localhost:5432/migrationbot_test
          REDIS_URL: redis://localhost:6379
          DEEPSEEK_API_KEY: mock-key
          JWT_SECRET: test-secret-32-characters-long-xx
          CORS_ORIGINS: "*"
        run: |
          cd backend
          pytest -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js app
        run: |
          cd frontend
          npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
