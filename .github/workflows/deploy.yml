name: CD Pipeline

on:
  push:
    branches: [ main, phase3 ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "Syncing latest code from origin/main..."
            if [ -d "/root/migrationbot" ]; then
              cd /root/migrationbot
            elif [ -d "~/migrationbot" ]; then
              cd ~/migrationbot
            else
              git clone git@github.com:${{ github.repository }}.git ~/migrationbot
              cd ~/migrationbot
            fi
            git fetch origin main
            git reset --hard origin/main
            echo "Stopping old containers..."
            docker compose down
            echo "Rebuilding all containers from scratch..."
            docker compose build --no-cache
            echo "Starting fresh containers..."
            docker compose up -d
            echo "Pruning old images..."
            docker image prune -f
            echo "Deployment finished successfully."
